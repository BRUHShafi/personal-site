<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Portal GLB Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07070f; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed; top: 16px; left: 16px;
      color: #aaa; font-family: monospace; font-size: 13px;
      background: rgba(0,0,0,0.6); padding: 10px 14px; border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="info">Loading Portal.glb…</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    const info = document.getElementById('info')

    // Scene
    const scene    = new THREE.Scene()
    const camera   = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100)
    camera.position.set(0, 0, 8)

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(innerWidth, innerHeight)
    renderer.setPixelRatio(devicePixelRatio)
    document.body.appendChild(renderer.domElement)

    // Orbit controls so you can inspect from all angles
    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true

    // Lights
    scene.add(new THREE.AmbientLight('#ffffff', 1))
    const dir = new THREE.DirectionalLight('#ffffff', 2)
    dir.position.set(5, 5, 5)
    scene.add(dir)

    // Load
    let mixer = null
    const loader = new GLTFLoader()
    loader.load(
      '/Portal.glb',
      (gltf) => {
        scene.add(gltf.scene)

        // Auto-center and scale to fit view
        const box    = new THREE.Box3().setFromObject(gltf.scene)
        const size   = box.getSize(new THREE.Vector3())
        const center = box.getCenter(new THREE.Vector3())
        const maxDim = Math.max(size.x, size.y, size.z)
        const scale  = 4 / maxDim
        gltf.scene.scale.setScalar(scale)
        gltf.scene.position.sub(center.multiplyScalar(scale))

        // Play animations if any
        if (gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(gltf.scene)
          gltf.animations.forEach((clip) => mixer.clipAction(clip).play())
          info.textContent = `✓ Loaded — ${gltf.animations.length} animation(s) found`
        } else {
          info.textContent = `✓ Loaded — no animations found`
        }
      },
      (xhr) => {
        info.textContent = `Loading… ${Math.round(xhr.loaded / xhr.total * 100)}%`
      },
      (err) => {
        info.textContent = `✗ Error: ${err.message}`
        console.error(err)
      }
    )

    // Render loop
    const clock = new THREE.Clock()
    const animate = () => {
      requestAnimationFrame(animate)
      const dt = clock.getDelta()
      if (mixer) mixer.update(dt)
      controls.update()
      renderer.render(scene, camera)
    }
    animate()

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(innerWidth, innerHeight)
    })
  </script>
</body>
</html>
